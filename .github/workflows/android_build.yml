name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: false 

      - name: Force Dependency Resolution
        run: |
          PROJECT_ROOT=$(find . -name pubspec.yaml -exec dirname {} \;)
          cd $PROJECT_ROOT
          
          # 1. Nettoyage radical des caches
          flutter clean
          flutter pub cache clean -f
          
          # 2. Reconstruction de la structure Android
          flutter create . --platforms android --org com.mdgejcdigital
          
          # 3. Force l'installation des dépendances manquantes
          rm -f pubspec.lock
          flutter pub get
          flutter pub add intl encrypt crypto hive hive_flutter

      - name: Compiler l'APK Réalité 100%
        run: |
          PROJECT_ROOT=$(find . -name pubspec.yaml -exec dirname {} \;)
          cd $PROJECT_ROOT
          
          # Build final incluant les 1.25% de frais et le chiffrement AES
          flutter build apk --release --no-tree-shake-icons
        
      - name: Livraison de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: cashcontrol-release
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
          if-no-files-found: error
