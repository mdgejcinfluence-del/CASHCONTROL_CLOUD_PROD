name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Localiser et Préparer le Projet
        run: |
          # Cette commande cherche le dossier contenant pubspec.yaml
          PROJECT_ROOT=$(find . -name pubspec.yaml -exec dirname {} \;)
          echo "Projet trouvé dans : $PROJECT_ROOT"
          cd $PROJECT_ROOT
          flutter pub get
        
      - name: Compiler l'APK Réalité 100%
        run: |
          PROJECT_ROOT=$(find . -name pubspec.yaml -exec dirname {} \;)
          cd $PROJECT_ROOT
          flutter build apk --release
        
      - name: Livraison de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: cashcontrol-release
          # On récupère l'APK peu importe où il a été généré
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
