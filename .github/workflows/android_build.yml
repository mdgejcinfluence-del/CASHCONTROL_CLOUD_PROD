name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # On fixe une version ultra-stable pour éviter les bugs serveur
          flutter-version: '3.19.0' 
          channel: 'stable'
          cache: false # On désactive le cache pour éviter de traîner des erreurs

      - name: Nettoyage et Réparation
        run: |
          PROJECT_ROOT=$(find . -name pubspec.yaml -exec dirname {} \;)
          cd $PROJECT_ROOT
          
          # Nettoyage profond des anciens fichiers de build
          flutter clean
          
          # Reconstruction de la structure Android
          flutter create . --platforms android
          
          # Réparation des dépendances (Hive, Crypto)
          rm -rf pubspec.lock
          flutter pub get

      - name: Compiler l'APK Réalité 100%
        run: |
          PROJECT_ROOT=$(find . -name pubspec.yaml -exec dirname {} \;)
          cd $PROJECT_ROOT
          # On ajoute --no-tree-shake-icons pour éviter certains bugs de compilation
          flutter build apk --release --no-tree-shake-icons
        
      - name: Livraison de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: cashcontrol-release
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
