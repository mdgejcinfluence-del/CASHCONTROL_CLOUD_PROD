name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        # On ajoute 'cd' pour entrer dans ton dossier avant de lancer la commande
        run: |
          cd cash_control_cloud
          flutter pub get
        
      - name: Build APK
        run: |
          cd cash_control_cloud
          flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cashcontrol-release
          # Chemin précis vers l'APK généré à l'intérieur du sous-dossier
          path: cash_control_cloud/build/app/outputs/flutter-apk/app-release.apk
